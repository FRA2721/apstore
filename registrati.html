<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registrati — ApStore</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- ══════════════ INTRO SPLASH ══════════════ -->
<div id="introSplash" style="position:fixed;inset:0;z-index:9999;background:#0a0a14;display:flex;align-items:center;justify-content:center;pointer-events:all;">
  <div id="introWord" style="font-family:'Google Sans','Helvetica Neue',Arial,sans-serif;font-size:clamp(4rem,18vw,16rem);font-weight:200;letter-spacing:-.04em;line-height:.9;color:#fff;opacity:0;">Registrati</div>
</div>
<style>
@keyframes introFadeIn  { from{opacity:0;transform:translateX(0)} to{opacity:1;transform:translateX(0)} }
@keyframes introFadeOut { from{opacity:1;transform:translateX(0)} to{opacity:0;transform:translateX(-18vw)} }
</style>
<script>
(function(){
  const splash=document.getElementById('introSplash'),word=document.getElementById('introWord');
  word.style.animation='introFadeIn .7s cubic-bezier(.16,1,.3,1) .15s forwards';
  setTimeout(()=>{
    word.style.animation='introFadeOut .6s cubic-bezier(.7,0,.84,0) forwards';
    setTimeout(()=>{
      splash.style.transition='opacity .65s cubic-bezier(.16,1,.3,1)';
      splash.style.opacity='0';
      setTimeout(()=>{ splash.style.display='none'; },680);
    },1050);
  },2000);
})();
</script>

<!-- ══════════════ NAV ══════════════ -->
<nav class="l-nav" id="lNav">
  <a href="index.html" class="l-logo">Ap<span>Store</span></a>
  <div class="l-nav-right">
    <a href="catalogo.html" class="l-btn-dark">Shop →</a>
    <button class="l-btn-light" onclick="toggleMenu()">Menu ••</button>
  </div>
</nav>

<!-- ══════════════ MENU OVERLAY ══════════════ -->
<div class="l-menu" id="lMenu">
  <div class="l-menu-header">
    <a href="index.html" class="l-menu-logo" onclick="toggleMenu()">Ap<span>Store</span></a>
    <button class="l-menu-close" onclick="toggleMenu()">✕ Chiudi</button>
  </div>
  <div class="l-menu-links">
    <a href="index.html" class="l-menu-link" onclick="toggleMenu()">Home <span>01</span></a>
    <a href="catalogo.html" class="l-menu-link" onclick="toggleMenu()">Products <span>02</span></a>
    <a href="blog.html" class="l-menu-link" onclick="toggleMenu()">Blog <span>03</span></a>
    <a href="login.html" class="l-menu-link" onclick="toggleMenu()">Account <span>04</span></a>
    <a href="carrello.html" class="l-menu-link" onclick="toggleMenu()">Carrello <span>05</span></a>
  </div>
  <div class="l-menu-footer">
    <a href="https://sellpilot.it" target="_blank">↗ SellPilot.it</a>
    <span style="color:rgba(255,255,255,.15)">·</span>
    <a href="registrati.html" onclick="toggleMenu()">Registrati</a>
  </div>
</div>

<div class="auth-wrap">
  <div class="auth-card" style="max-width:480px;">
    <div style="text-align:center;margin-bottom:28px;">
      <div style="width:52px;height:52px;border-radius:50%;background:var(--indigo-soft);display:flex;align-items:center;justify-content:center;margin:0 auto 14px;">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--indigo)" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>
      </div>
      <h2>Crea il tuo account</h2>
      <p class="auth-sub">Unisciti a 50.000+ clienti soddisfatti</p>
    </div>

    <form onsubmit="doRegister(event)">
      <div class="form-grid">
        <div class="form-field">
          <label>Nome *</label>
          <input type="text" id="rNome" placeholder="Mario" required>
        </div>
        <div class="form-field">
          <label>Cognome *</label>
          <input type="text" id="rCognome" placeholder="Rossi" required>
        </div>
      </div>
      <div class="form-field">
        <label>Email *</label>
        <input type="email" id="rEmail" placeholder="mario@esempio.it" required>
      </div>
      <div class="form-field">
        <label>Telefono <span style="color:var(--text-muted);font-weight:400;">(opzionale)</span></label>
        <input type="tel" placeholder="+39 000 0000000">
      </div>
      <div class="form-grid">
        <div class="form-field">
          <label>Password *</label>
          <input type="password" id="rPwd" placeholder="min. 8 caratteri" required minlength="8">
        </div>
        <div class="form-field">
          <label>Conferma *</label>
          <input type="password" id="rPwd2" placeholder="••••••••" required>
        </div>
      </div>
      <div style="display:flex;flex-direction:column;gap:10px;margin-bottom:22px;">
        <label class="form-check">
          <input type="checkbox" id="chkTerms" required>
          Accetto i <a href="#" style="color:var(--indigo);">Termini</a> e la <a href="#" style="color:var(--indigo);">Privacy Policy</a>
        </label>
        <label class="form-check">
          <input type="checkbox">
          Voglio ricevere offerte e novità via email
        </label>
      </div>
      <button type="submit" class="btn-primary" style="width:100%;padding:12px;font-size:.92rem;">Crea Account →</button>
    </form>

    <div class="auth-divider">oppure</div>

    <button class="btn-social" onclick="socialReg('Google')">
      <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Registrati con Google
    </button>

    <div class="auth-footer">Hai già un account? <a href="login.html">Accedi →</a></div>
  </div>
</div>

<footer class="l-footer">
  <div class="l-footer-bottom">
    <span>© 2026 ApStore — Powered by <a href="https://sellpilot.it">SellPilot.it</a></span>
  </div>
</footer>

<script src="js/data.js"></script>
<script src="js/main.js"></script>
<script>
  function doRegister(e) {
    e.preventDefault();
    const nome    = document.getElementById('rNome').value;
    const cognome = document.getElementById('rCognome').value;
    const email   = document.getElementById('rEmail').value;
    const pwd     = document.getElementById('rPwd').value;
    const pwd2    = document.getElementById('rPwd2').value;
    if (pwd !== pwd2) { showToast('Le password non coincidono', 'error'); return; }
    localStorage.setItem('apstore_user', JSON.stringify({ email, name: nome + ' ' + cognome }));
    showToast('Account creato con successo! 🎉', 'success');
    setTimeout(() => window.location.href = 'index.html', 1200);
  }
  function socialReg(p) {
    localStorage.setItem('apstore_user', JSON.stringify({ email: `utente@${p.toLowerCase()}.com`, name: 'Utente ' + p }));
    showToast(`Registrazione con ${p} completata!`, 'success');
    setTimeout(() => window.location.href = 'index.html', 1200);
  }
</script>
<script>
window.addEventListener('scroll',()=>{ document.getElementById('lNav').classList.toggle('scrolled',scrollY>50); },{passive:true});
function toggleMenu(){ const m=document.getElementById('lMenu'); m.classList.toggle('open'); document.body.style.overflow=m.classList.contains('open')?'hidden':''; }
</script>
</body>
</html>
